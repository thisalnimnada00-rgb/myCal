<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVA-7: Sci-Fi Quantum Calculator</title>
    <style>
        :root {
            --bg-color: #05080a;
            --panel-bg: rgba(10, 25, 30, 0.8);
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --text-color: #e0fbfc;
            --glass-border: rgba(0, 242, 255, 0.2);
            --button-hover: rgba(0, 242, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Orbitron', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        /* Animated Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-10%);
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .calc-container {
            width: 850px;
            height: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: power-on 0.8s ease-out;
        }

        @keyframes power-on {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); filter: brightness(3); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }
        }

        /* Calculator Main Section */
        .main-engine {
            flex: 2;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
        }

        .display-unit {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-cyan);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1);
        }

        #prev-op {
            font-size: 0.9rem;
            color: var(--neon-cyan);
            opacity: 0.7;
            height: 20px;
            letter-spacing: 2px;
        }

        #current-op {
            font-size: 2.5rem;
            font-weight: 300;
            margin-top: 5px;
            text-shadow: 0 0 10px var(--neon-cyan);
            overflow-x: auto;
            white-space: nowrap;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            flex-grow: 1;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--button-hover);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transform: translateY(-2px);
        }

        button:active { transform: translateY(1px); }

        .op-btn { color: var(--neon-cyan); font-weight: bold; }
        .sci-btn { font-size: 0.8rem; color: #7de2ff; }
        .equals { 
            grid-column: span 2; 
            background: linear-gradient(45deg, #00c3ff, #bc13fe); 
            border: none;
            color: white;
            font-weight: bold;
        }

        /* Sidebar/History Section */
        .sidebar {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        #history-log {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .history-item {
            padding: 10px;
            border-left: 2px solid var(--neon-magenta);
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Scanline Effect */
        .calc-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="calc-container">
        <!-- Main Calculation Area -->
        <section class="main-engine">
            <div class="display-unit">
                <div id="prev-op"></div>
                <div id="current-op">0</div>
            </div>

            <div class="keypad">
                <!-- Row 1 -->
                <button class="sci-btn" onclick="pushValue('Math.sin(')">SIN</button>
                <button class="sci-btn" onclick="pushValue('Math.cos(')">COS</button>
                <button class="sci-btn" onclick="pushValue('Math.tan(')">TAN</button>
                <button class="op-btn" onclick="clearAll()">AC</button>
                <button class="op-btn" onclick="deleteLast()">DEL</button>

                <!-- Row 2 -->
                <button class="sci-btn" onclick="pushValue('Math.PI')">π</button>
                <button class="sci-btn" onclick="pushValue('Math.log10(')">LOG</button>
                <button class="sci-btn" onclick="pushValue('**')">EXP</button>
                <button class="sci-btn" onclick="pushValue('(')">(</button>
                <button class="sci-btn" onclick="pushValue(')')">)</button>

                <!-- Row 3 -->
                <button onclick="pushValue('7')">7</button>
                <button onclick="pushValue('8')">8</button>
                <button onclick="pushValue('9')">9</button>
                <button class="op-btn" onclick="pushValue('/')">÷</button>
                <button class="sci-btn" onclick="pushValue('Math.sqrt(')">√</button>

                <!-- Row 4 -->
                <button onclick="pushValue('4')">4</button>
                <button onclick="pushValue('5')">5</button>
                <button onclick="pushValue('6')">6</button>
                <button class="op-btn" onclick="pushValue('*')">×</button>
                <button class="sci-btn" onclick="pushValue('%')">MOD</button>

                <!-- Row 5 -->
                <button onclick="pushValue('1')">1</button>
                <button onclick="pushValue('2')">2</button>
                <button onclick="pushValue('3')">3</button>
                <button class="op-btn" onclick="pushValue('-')">-</button>
                <button class="sci-btn" onclick="pushValue('Math.E')">e</button>

                <!-- Row 6 -->
                <button onclick="pushValue('0')">0</button>
                <button onclick="pushValue('.')">.</button>
                <button class="op-btn" onclick="pushValue('+')">+</button>
                <button class="equals" onclick="calculate()">PROCESS RESULT</button>
            </div>
        </section>

        <!-- History Sidebar -->
        <aside class="sidebar">
            <h2>HISTORY_LOG</h2>
            <div id="history-log">
                <!-- Dynamic Content -->
            </div>
        </aside>
    </div>

    <script>
        const currentDisplay = document.getElementById('current-op');
        const prevDisplay = document.getElementById('prev-op');
        const historyLog = document.getElementById('history-log');

        let calculationString = "";

        function pushValue(val) {
            if (currentDisplay.innerText === "0" && val !== ".") {
                calculationString = val;
            } else {
                calculationString += val;
            }
            updateDisplay();
            playClickSound();
        }

        function clearAll() {
            calculationString = "";
            currentDisplay.innerText = "0";
            prevDisplay.innerText = "";
        }

        function deleteLast() {
            calculationString = calculationString.slice(0, -1);
            if (calculationString === "") {
                currentDisplay.innerText = "0";
            } else {
                updateDisplay();
            }
        }

        function updateDisplay() {
            // Making it look cleaner for the user
            let formatted = calculationString
                .replace(/Math\.sin\(/g, 'sin(')
                .replace(/Math\.cos\(/g, 'cos(')
                .replace(/Math\.tan\(/g, 'tan(')
                .replace(/Math\.log10\(/g, 'log(')
                .replace(/Math\.PI/g, 'π')
                .replace(/Math\.E/g, 'e')
                .replace(/Math\.sqrt\(/g, '√(')
                .replace(/\*\*/g, '^');
            
            currentDisplay.innerText = formatted || "0";
        }

        function calculate() {
            try {
                let expression = calculationString;
                // Auto-close brackets if user forgot
                const openBrackets = (expression.match(/\(/g) || []).length;
                const closeBrackets = (expression.match(/\)/g) || []).length;
                for(let i=0; i < (openBrackets - closeBrackets); i++) {
                    expression += ")";
                }

                const result = eval(expression);
                
                if (result === undefined) return;

                // Add to history
                addToHistory(currentDisplay.innerText, result);

                prevDisplay.innerText = currentDisplay.innerText + " =";
                currentDisplay.innerText = Number.isInteger(result) ? result : result.toFixed(4);
                calculationString = result.toString();

            } catch (error) {
                currentDisplay.innerText = "SYSTEM_ERROR";
                setTimeout(clearAll, 1500);
            }
        }

        function addToHistory(op, res) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div style="color: #666; font-size: 0.7rem;">${new Date().toLocaleTimeString()}</div>
                <div>${op}</div>
                <div style="color: var(--neon-cyan); font-weight: bold;">> ${res}</div>
            `;
            historyLog.prepend(item);
        }

        // Haptic-like visual feedback
        function playClickSound() {
            currentDisplay.style.textShadow = "0 0 20px #fff";
            setTimeout(() => {
                currentDisplay.style.textShadow = "0 0 10px var(--neon-cyan)";
            }, 100);
        }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) pushValue(e.key);
            if (e.key === '+') pushValue('+');
            if (e.key === '-') pushValue('-');
            if (e.key === '*') pushValue('*');
            if (e.key === '/') pushValue('/');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
</body>
</html>
